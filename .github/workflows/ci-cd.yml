name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: ESLint 程式碼檢查
        run: npm run lint

      - name: TypeScript 型別檢查
        run: npx tsc -b

      - name: 單元測試
        run: npm run test

      - name: 建構檢查
        run: npx vite build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://placeholder.api.com' }}
          VITE_GOOGLE_CALLBACK: ${{ vars.VITE_GOOGLE_CALLBACK || 'https://placeholder.com/callback' }}

  deploy:
    name: CD - Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 觸發 Render 部署
        run: |
          response=$(curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render Deploy Response: $response"
